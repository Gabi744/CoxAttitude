<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#C68A28">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VW Vintage Arcade</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23E3A73E'/%3E%3Ccircle cx='50' cy='42' r='28' fill='%23F7E7C6'/%3E%3Crect x='18' y='46' width='64' height='30' rx='15' fill='%232E8C82'/%3E%3Ccircle cx='34' cy='58' r='7' fill='%234A2F23'/%3E%3Ccircle cx='66' cy='58' r='7' fill='%234A2F23'/%3E%3C/svg%3E">
<style>
/* ==========================================================================
   VW VINTAGE ARCADE — feuille de style
   Palette "California 70s" : crème chaude, moutarde, orange, teal, terracotta.
   ========================================================================== */
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{
  margin:0; padding:0; width:100%; height:100%;
  overflow:hidden; overscroll-behavior:none;
  font-family:'Arial Rounded MT Bold','Segoe UI Rounded','Helvetica Rounded',Arial,sans-serif;
  background:#211a15;
}
button{ font:inherit; border:none; background:none; padding:0; margin:0; cursor:pointer; color:inherit; }
p,h1,h2{ margin:0; }

:root{
  --cream:#F7E7C6;
  --cream-dark:#EAD4A4;
  --paper:#FBF0DA;
  --mustard:#E3A73E;
  --mustard-dark:#C68A28;
  --orange:#DB6B34;
  --orange-dark:#B84E22;
  --teal:#2E8C82;
  --teal-dark:#1F6C64;
  --terracotta:#C1502E;
  --brown:#4A2F23;
  --brown-light:#6B4A38;
  --sand:#E7C98F;
  --road:#8C7C68;
  --road-line:#F3E3C0;
  --green:#7C8A4C;
  --green-dark:#5E6B38;
  --white:#FFF8EC;
  --glass:#345C63;
}

body{ display:flex; justify-content:center; align-items:center; min-height:100vh; min-height:100dvh; }

#app{
  position:relative;
  width:100%; max-width:480px;
  height:100vh; height:100dvh;
  overflow:hidden;
  background:var(--cream);
  box-shadow:0 0 60px rgba(0,0,0,.55);
}

.screen{ position:absolute; inset:0; display:none; flex-direction:column; }
.screen.is-active{ display:flex; }

/* ---------------------------------- MENU ---------------------------------- */
#screen-menu{ background:var(--cream); }

.menu-scene{
  position:relative; flex-shrink:0;
  height:36%; min-height:200px; max-height:280px;
  overflow:hidden;
  background:linear-gradient(180deg,#FCE8B9,#F6B183 78%,#E9A468);
}
.sun-rays{
  position:absolute; left:50%; top:30%; width:230px; height:230px;
  margin-left:-115px; margin-top:-115px; border-radius:50%;
  background:repeating-conic-gradient(from 0deg, rgba(227,167,62,.55) 0deg 4deg, transparent 4deg 20deg);
  animation:spin 90s linear infinite;
}
.sun{
  position:absolute; left:50%; top:30%; width:120px; height:120px;
  margin-left:-60px; margin-top:-60px; border-radius:50%;
  background:radial-gradient(circle at 35% 32%, #FFF0C4, var(--mustard) 72%);
  box-shadow:0 0 46px rgba(227,167,62,.65);
}
@keyframes spin{ to{ transform:rotate(360deg); } }

.cloud{ position:absolute; background:var(--white); border-radius:40px; opacity:.9; }
.cloud::before,.cloud::after{ content:""; position:absolute; background:var(--white); border-radius:50%; }
.cloud1{ width:64px; height:22px; top:14%; left:10%; }
.cloud1::before{ width:30px; height:30px; top:-15px; left:6px; }
.cloud1::after{ width:22px; height:22px; top:-10px; left:30px; }
.cloud2{ width:48px; height:16px; top:10%; right:14%; }
.cloud2::before{ width:22px; height:22px; top:-11px; left:5px; }
.cloud2::after{ width:18px; height:18px; top:-7px; left:22px; }

.hill{ position:absolute; left:-8%; width:116%; border-radius:50%/100% 100% 0 0; }
.hill-back{ height:64px; bottom:24px; background:var(--green); opacity:.9; }
.hill-front{ height:50px; bottom:0; background:var(--green-dark); }

.flower{ position:absolute; bottom:10px; width:22px; height:22px; }
.flower1{ left:9%; transform:scale(.85); }
.flower2{ right:11%; transform:scale(1.05); }

.menu-content{
  flex:1; min-height:0; display:flex; flex-direction:column; align-items:center;
  padding:14px 20px 22px; overflow-y:auto; position:relative; z-index:2; margin-top:-16px;
}
.title{ text-align:center; margin:2px 0 4px; line-height:.92; }
.title-line1,.title-line2{
  display:block; font-weight:900; letter-spacing:1.5px;
  -webkit-text-stroke:1px var(--brown);
}
.title-line1{
  font-size:clamp(22px,7vw,28px); color:var(--paper);
  text-shadow:2px 2px 0 var(--brown), 4px 4px 0 rgba(74,47,35,.3);
}
.title-line2{
  font-size:clamp(30px,9.5vw,38px); color:var(--teal);
  text-shadow:2px 2px 0 var(--brown), 4px 4px 0 rgba(74,47,35,.3);
}
.subtitle{ margin:6px 0 16px; font-size:13px; font-weight:700; color:var(--brown-light); text-align:center; }

.mode-cards{ width:100%; display:flex; flex-direction:column; gap:14px; }
.mode-card{
  position:relative; display:flex; align-items:center; gap:12px; width:100%;
  background:var(--paper); border:3px solid var(--brown); border-radius:20px;
  box-shadow:5px 5px 0 var(--brown); padding:12px; text-align:left;
  transition:transform .08s ease, box-shadow .08s ease;
}
.mode-card:active{ transform:translate(4px,4px); box-shadow:1px 1px 0 var(--brown); }
.mode-icon{ width:62px; height:62px; flex-shrink:0; display:block; border-radius:14px; background:var(--cream-dark); }
.mode-info{ flex:1; min-width:0; }
.mode-info h2{ font-size:15px; letter-spacing:.3px; color:var(--brown); margin-bottom:3px; }
.mode-info p{ font-size:11.5px; color:var(--brown-light); margin-bottom:6px; }
.mode-best{ font-size:10.5px; font-weight:700; color:var(--teal-dark); }
.mode-best strong{ font-size:13px; color:var(--orange-dark); margin-left:4px; }
.play-chip{
  position:absolute; top:-9px; right:12px; background:var(--orange); color:var(--white);
  font-size:10px; font-weight:800; letter-spacing:.4px; padding:4px 9px;
  border-radius:20px; border:2px solid var(--brown);
}
.footer-note{ margin-top:16px; font-size:11.5px; color:var(--brown-light); text-align:center; }

/* -------------------------------- ÉCRAN JEU -------------------------------- */
#screen-game{ background:var(--brown); }
#hud{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:9px 12px; padding-top:calc(9px + env(safe-area-inset-top));
  background:var(--brown); color:var(--paper); flex-shrink:0; z-index:5;
}
.hud-btn{
  width:36px; height:36px; border-radius:12px; border:2px solid var(--paper);
  background:var(--terracotta); color:var(--paper); font-size:17px; font-weight:900;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.hud-scores,.hud-best{ display:flex; flex-direction:column; align-items:center; line-height:1.15; min-width:56px; }
.hud-scores{ align-items:flex-start; }
.hud-best{ align-items:flex-end; }
.hud-scores span:first-child,.hud-best span:first-child{ font-size:9.5px; letter-spacing:1px; opacity:.8; }
.hud-scores span:last-child,.hud-best span:last-child{ font-size:19px; font-weight:900; color:var(--mustard); }

#canvasWrap{ position:relative; flex:1; min-height:0; touch-action:none; overflow:hidden; }
#gameCanvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

@keyframes crashFlash{
  0%{ box-shadow:inset 0 0 0 10px rgba(193,67,46,.95); }
  100%{ box-shadow:inset 0 0 0 10px rgba(193,67,46,0); }
}
#canvasWrap.crash{ animation:crashFlash .45s ease-out; }

.fade-hint{
  position:absolute; left:50%; bottom:22px; transform:translateX(-50%);
  background:rgba(74,47,35,.88); color:var(--paper); padding:8px 16px; border-radius:20px;
  font-size:12px; font-weight:700; opacity:0; transition:opacity .4s ease; pointer-events:none;
  z-index:7; white-space:nowrap; max-width:88%; text-align:center;
}
.fade-hint.show{ opacity:1; }

#countdown{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:58px; font-weight:900; color:var(--paper);
  text-shadow:4px 4px 0 var(--brown); pointer-events:none; z-index:8;
  opacity:0; transition:opacity .15s ease;
}
#countdown.show{ opacity:1; }

.panel{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(30,20,14,.6); z-index:10; }
.panel.hidden{ display:none; }
.panel-card{
  width:82%; max-width:320px; background:var(--paper); border:3px solid var(--brown);
  border-radius:20px; box-shadow:6px 6px 0 var(--brown); padding:24px 22px; text-align:center;
}
.panel-card h2{ font-size:19px; color:var(--terracotta); letter-spacing:.5px; margin-bottom:10px; }
.badge{ display:inline-block; margin-bottom:10px; padding:4px 11px; background:var(--mustard); border:2px solid var(--brown); border-radius:20px; font-size:10.5px; font-weight:800; letter-spacing:.3px; }
.badge.hidden{ display:none; }
.go-score,.go-best{ font-size:13.5px; color:var(--brown-light); margin:3px 0; }
.go-score span,.go-best span{ font-weight:900; color:var(--teal-dark); font-size:19px; }
.panel-actions{ display:flex; gap:10px; margin-top:18px; }
.btn{ flex:1; padding:12px 0; border-radius:14px; border:2px solid var(--brown); font-weight:900; font-size:12.5px; letter-spacing:.4px; }
.btn-primary{ background:var(--orange); color:var(--white); }
.btn-secondary{ background:var(--cream-dark); color:var(--brown); }

/* ------------------------------ AVERTISSEMENT ------------------------------ */
#rotate-warning{
  display:none; position:fixed; inset:0; z-index:999; background:var(--brown); color:var(--paper);
  flex-direction:column; align-items:center; justify-content:center; text-align:center;
  font-weight:800; padding:20px; gap:10px;
}
.phone-icon{ font-size:46px; animation:rotatePhone 1.6s ease-in-out infinite; }
@keyframes rotatePhone{ 0%,100%{ transform:rotate(0deg); } 50%{ transform:rotate(90deg); } }
@media (orientation:landscape) and (max-height:520px){
  #rotate-warning{ display:flex; }
  #app{ display:none; }
}
</style>
</head>
<body>

<div id="rotate-warning">
  <div class="phone-icon">📱</div>
  <p>Tourne ton téléphone<br>pour jouer en mode vertical !</p>
</div>

<div id="app">

  <!-- ===================== MENU PRINCIPAL ===================== -->
  <section id="screen-menu" class="screen is-active">
    <div class="menu-scene">
      <div class="sun-rays"></div>
      <div class="sun"></div>
      <div class="cloud cloud1"></div>
      <div class="cloud cloud2"></div>
      <div class="hill hill-back"></div>
      <div class="hill hill-front"></div>
      <svg class="flower flower1" viewBox="0 0 40 40"><g fill="#C1502E"><circle cx="20" cy="9" r="7"/><circle cx="20" cy="31" r="7"/><circle cx="9" cy="20" r="7"/><circle cx="31" cy="20" r="7"/></g><circle cx="20" cy="20" r="6.5" fill="#E3A73E"/></svg>
      <svg class="flower flower2" viewBox="0 0 40 40"><g fill="#FBF0DA"><circle cx="20" cy="9" r="7"/><circle cx="20" cy="31" r="7"/><circle cx="9" cy="20" r="7"/><circle cx="31" cy="20" r="7"/></g><circle cx="20" cy="20" r="6.5" fill="#2E8C82"/></svg>
    </div>

    <div class="menu-content">
      <h1 class="title">
        <span class="title-line1">VW VINTAGE</span>
        <span class="title-line2">ARCADE</span>
      </h1>
      <p class="subtitle">Deux jeux rétro, un seul road trip 🌻</p>

      <div class="mode-cards">
        <button class="mode-card" data-mode="snake" type="button">
          <canvas class="mode-icon" id="iconSnake" width="120" height="120"></canvas>
          <div class="mode-info">
            <h2>COMBI SNAKE</h2>
            <p>Ramasse bidons &amp; boards, évite le mur</p>
            <div class="mode-best">Meilleur score <strong id="bestSnake">0</strong></div>
          </div>
          <span class="play-chip">JOUER ▶</span>
        </button>

        <button class="mode-card" data-mode="highway" type="button">
          <canvas class="mode-icon" id="iconHighway" width="120" height="120"></canvas>
          <div class="mode-info">
            <h2>BEETLE HIGHWAY</h2>
            <p>Change de voie, évite tout le monde</p>
            <div class="mode-best">Meilleur score <strong id="bestHighway">0</strong></div>
          </div>
          <span class="play-chip">JOUER ▶</span>
        </button>
      </div>

      <p class="footer-note">100% dans ton navigateur · scores sauvegardés sur cet appareil</p>
    </div>
  </section>

  <!-- ===================== ÉCRAN DE JEU ===================== -->
  <section id="screen-game" class="screen">
    <header id="hud">
      <button id="btnBack" class="hud-btn" type="button" aria-label="Retour au menu">←</button>
      <div class="hud-scores"><span>SCORE</span><span id="hudScore">0</span></div>
      <div class="hud-best"><span>MEILLEUR</span><span id="hudBest">0</span></div>
    </header>

    <div id="canvasWrap">
      <canvas id="gameCanvas"></canvas>
      <div id="swipeHint" class="fade-hint"></div>
      <div id="countdown"></div>
      <div id="gameOverPanel" class="panel hidden">
        <div class="panel-card">
          <h2 id="goTitle">PARTIE TERMINÉE</h2>
          <div id="newRecordBadge" class="badge hidden">★ NOUVEAU RECORD ★</div>
          <p class="go-score">Score : <span id="goScore">0</span></p>
          <p class="go-best">Meilleur score : <span id="goBest">0</span></p>
          <div class="panel-actions">
            <button id="btnRetry" class="btn btn-primary" type="button">REJOUER</button>
            <button id="btnMenu" class="btn btn-secondary" type="button">MENU</button>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>

<script>
(function(){
'use strict';

/* ==========================================================================
   VW VINTAGE ARCADE — logique du jeu
   Fichier unique, sans dépendance externe. Rendu 100% Canvas pour le jeu,
   HTML/CSS pour les menus et overlays.
   ========================================================================== */

/* --------------------------------- UTILS --------------------------------- */
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function lerp(a,b,t){ return a + (b - a) * t; }
function rand(min,max){ return Math.random() * (max - min) + min; }
function randInt(min,max){ return Math.floor(rand(min, max + 1)); }
function choice(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

function roundRectPath(ctx,x,y,w,h,r){
  if (typeof r === 'number'){ r = { tl:r, tr:r, br:r, bl:r }; }
  var tl = Math.min(r.tl || 0, h/2, w/2);
  var tr = Math.min(r.tr || 0, h/2, w/2);
  var br = Math.min(r.br || 0, h/2, w/2);
  var bl = Math.min(r.bl || 0, h/2, w/2);
  ctx.beginPath();
  ctx.moveTo(x+tl, y);
  ctx.lineTo(x+w-tr, y);
  ctx.arcTo(x+w, y, x+w, y+tr, tr);
  ctx.lineTo(x+w, y+h-br);
  ctx.arcTo(x+w, y+h, x+w-br, y+h, br);
  ctx.lineTo(x+bl, y+h);
  ctx.arcTo(x, y+h, x, y+h-bl, bl);
  ctx.lineTo(x, y+tl);
  ctx.arcTo(x, y, x+tl, y, tl);
  ctx.closePath();
}

function rectsOverlap(ax1,ay1,ax2,ay2,bx1,by1,bx2,by2){
  return ax1 < bx2 && ax2 > bx1 && ay1 < by2 && ay2 > by1;
}

/* -------------------------------- PALETTE -------------------------------- */
var PAL = {
  cream:'#F7E7C6', creamDark:'#EAD4A4', paper:'#FBF0DA',
  mustard:'#E3A73E', mustardDark:'#C68A28',
  orange:'#DB6B34', orangeDark:'#B84E22',
  teal:'#2E8C82', tealDark:'#1F6C64',
  terracotta:'#C1502E', brown:'#4A2F23', brownLight:'#6B4A38',
  sand:'#E7C98F', road:'#8C7C68', roadLine:'#F3E3C0',
  green:'#7C8A4C', greenDark:'#5E6B38',
  white:'#FFF8EC', glass:'#345C63'
};

/* -------------------------------- STOCKAGE -------------------------------- */
var STORE_KEYS = { snake:'vwArcade.highscore.snake', highway:'vwArcade.highscore.highway' };
function getBest(mode){
  try{ return parseInt(localStorage.getItem(STORE_KEYS[mode]), 10) || 0; }
  catch(e){ return 0; }
}
function setBestIfHigher(mode, score){
  var best = getBest(mode);
  if (score > best){
    try{ localStorage.setItem(STORE_KEYS[mode], String(score)); }catch(e){}
    return true;
  }
  return false;
}

/* ------------------------------- ÉLÉMENTS DOM ------------------------------- */
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
var canvasWrap = document.getElementById('canvasWrap');
var hudScoreEl = document.getElementById('hudScore');
var hudBestEl = document.getElementById('hudBest');
var btnBack = document.getElementById('btnBack');
var gameOverPanel = document.getElementById('gameOverPanel');
var goTitle = document.getElementById('goTitle');
var goScore = document.getElementById('goScore');
var goBest = document.getElementById('goBest');
var newRecordBadge = document.getElementById('newRecordBadge');
var btnRetry = document.getElementById('btnRetry');
var btnMenu = document.getElementById('btnMenu');
var countdownEl = document.getElementById('countdown');
var swipeHint = document.getElementById('swipeHint');
var bestSnakeEl = document.getElementById('bestSnake');
var bestHighwayEl = document.getElementById('bestHighway');

/* -------------------------------- ÉTAT GLOBAL -------------------------------- */
var currentMode = null;   // 'snake' | 'highway'
var running = false;      // true pendant le gameplay actif
var W = 0, H = 0;         // taille logique du canvas (px CSS)
var sessionToken = 0;     // invalide les callbacks différés d'une ancienne partie

/* ------------------------------- CANVAS RESIZE ------------------------------- */
function resizeCanvas(){
  var dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  var rect = canvasWrap.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (currentMode === 'snake') setupSnakeGrid();
  if (currentMode === 'highway') setupHighwayLanes();
}
window.addEventListener('resize', resizeCanvas);

/* ==========================================================================
   DESSINS PARTAGÉS (véhicules, obstacles, décor) — vus de dessus
   ========================================================================== */

// Combi (fourgon) — orienté par défaut vers la droite (angle 0 = +x = avant)
function drawCombi(ctx, cx, cy, size, angle, tone){
  tone = tone || { body:PAL.cream, trim:PAL.teal };
  var w = size, h = size * 0.6;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  ctx.fillStyle = 'rgba(74,47,35,0.18)';
  roundRectPath(ctx, -w/2+2, -h/2+3, w, h, h*0.34);
  ctx.fill();

  roundRectPath(ctx, -w/2, -h/2, w, h, h*0.34);
  ctx.fillStyle = tone.body;
  ctx.fill();
  ctx.lineWidth = Math.max(1.5, h*0.09);
  ctx.strokeStyle = tone.trim;
  ctx.stroke();

  // roues aux quatre coins
  ctx.fillStyle = PAL.brown;
  var wheelR = h * 0.14;
  var wheelPos = [[-w*0.30,-h*0.5],[-w*0.30,h*0.5],[w*0.30,-h*0.5],[w*0.30,h*0.5]];
  for (var i=0;i<wheelPos.length;i++){
    var p = wheelPos[i];
    roundRectPath(ctx, p[0]-wheelR, p[1]-wheelR*0.6, wheelR*2, wheelR*1.2, wheelR*0.5);
    ctx.fill();
  }

  // pare-brise avant (le "devant" est vers +x)
  ctx.fillStyle = PAL.glass;
  roundRectPath(ctx, w*0.16, -h*0.32, w*0.18, h*0.64, 4);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(w*0.25, -h*0.30);
  ctx.lineTo(w*0.25, h*0.30);
  ctx.stroke();

  // phares
  ctx.fillStyle = PAL.paper;
  ctx.strokeStyle = PAL.brown;
  ctx.lineWidth = 1;
  [-h*0.30, h*0.30].forEach(function(py){
    ctx.beginPath(); ctx.arc(w*0.42, py, h*0.10, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  });

  // rétroviseurs
  ctx.fillStyle = tone.trim;
  ctx.fillRect(w*0.06, -h*0.58, w*0.06, h*0.10);
  ctx.fillRect(w*0.06, h*0.48, w*0.06, h*0.10);

  // badge central
  ctx.fillStyle = tone.trim;
  ctx.beginPath(); ctx.arc(w*0.36, 0, h*0.09, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// Section de remorque / wagon du corps du Combi Snake
function drawTrailer(ctx, cx, cy, size, angle, idx){
  var w = size * 0.92, h = size * 0.56;
  var tone = (idx % 2 === 0) ? { body:PAL.mustard, trim:PAL.mustardDark } : { body:PAL.orange, trim:PAL.orangeDark };
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  ctx.fillStyle = 'rgba(74,47,35,0.15)';
  roundRectPath(ctx, -w/2+2, -h/2+2, w, h, h*0.3);
  ctx.fill();

  roundRectPath(ctx, -w/2, -h/2, w, h, h*0.3);
  ctx.fillStyle = tone.body;
  ctx.fill();
  ctx.lineWidth = Math.max(1.5, h*0.1);
  ctx.strokeStyle = tone.trim;
  ctx.stroke();

  ctx.fillStyle = PAL.brown;
  var wheelR = h * 0.13;
  var wheelPos = [[-w*0.28,-h*0.5],[-w*0.28,h*0.5],[w*0.28,-h*0.5],[w*0.28,h*0.5]];
  for (var i=0;i<wheelPos.length;i++){
    var p = wheelPos[i];
    roundRectPath(ctx, p[0]-wheelR, p[1]-wheelR*0.6, wheelR*2, wheelR*1.2, wheelR*0.5);
    ctx.fill();
  }
  ctx.restore();
}

function drawGasCan(ctx, cx, cy, size){
  var w = size*0.6, h = size*0.6;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = 'rgba(74,47,35,0.18)';
  roundRectPath(ctx, -w/2+2, -h/2+3, w, h, 4);
  ctx.fill();
  roundRectPath(ctx, -w/2, -h/2, w, h, 4);
  ctx.fillStyle = PAL.terracotta;
  ctx.fill();
  ctx.strokeStyle = PAL.brown; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = PAL.brown;
  ctx.fillRect(-w*0.12, -h*0.62, w*0.24, h*0.16);
  ctx.strokeStyle = PAL.brown; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, -h*0.5, w*0.18, Math.PI, 0); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-w*0.28, -h*0.05); ctx.lineTo(w*0.28, -h*0.05);
  ctx.moveTo(0, -h*0.28); ctx.lineTo(0, h*0.3);
  ctx.stroke();
  ctx.restore();
}

function drawSurfboard(ctx, cx, cy, size){
  var len = size*0.92, wid = size*0.28;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(Math.PI/4);
  ctx.fillStyle = 'rgba(74,47,35,0.15)';
  ctx.beginPath(); ctx.ellipse(1,2,len/2,wid/2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,0,len/2,wid/2,0,0,Math.PI*2);
  ctx.fillStyle = PAL.teal; ctx.fill();
  ctx.strokeStyle = PAL.brown; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = PAL.paper;
  ctx.beginPath(); ctx.ellipse(0,0,len*0.34,wid*0.22,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawFood(ctx, cx, cy, size, type){
  if (type === 'board') drawSurfboard(ctx, cx, cy, size);
  else drawGasCan(ctx, cx, cy, size);
}

function drawBeetleTopDown(ctx, cx, cy, size, tilt){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(tilt || 0);
  var w = size, h = size * 1.32;

  ctx.fillStyle = 'rgba(74,47,35,0.2)';
  ctx.beginPath(); ctx.ellipse(2,4,w*0.52,h*0.5,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = PAL.mustard;
  ctx.beginPath(); ctx.ellipse(0,0,w*0.5,h*0.5,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = PAL.brown; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.fillStyle = PAL.glass;
  ctx.beginPath(); ctx.ellipse(0,-h*0.20,w*0.32,h*0.18,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = 'rgba(52,92,99,0.7)';
  ctx.beginPath(); ctx.ellipse(0,h*0.28,w*0.28,h*0.14,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = PAL.paper;
  ctx.beginPath(); ctx.arc(-w*0.30,-h*0.40,w*0.10,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w*0.30,-h*0.40,w*0.10,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = PAL.terracotta;
  ctx.beginPath(); ctx.arc(-w*0.30,h*0.42,w*0.07,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w*0.30,h*0.42,w*0.07,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = PAL.brown;
  var wheelPos = [[-w*0.48,-h*0.28],[w*0.48,-h*0.28],[-w*0.48,h*0.28],[w*0.48,h*0.28]];
  for (var i=0;i<wheelPos.length;i++){
    var p = wheelPos[i];
    roundRectPath(ctx, p[0]-w*0.06, p[1]-h*0.08, w*0.12, h*0.16, 3);
    ctx.fill();
  }
  ctx.restore();
}

function drawObstacle(ctx, cx, cy, laneW, type){
  ctx.save();
  ctx.translate(cx, cy);
  if (type === 'cone'){
    ctx.fillStyle = 'rgba(74,47,35,0.18)';
    ctx.beginPath(); ctx.ellipse(1,laneW*0.16,laneW*0.22,laneW*0.08,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = PAL.orange;
    ctx.beginPath();
    ctx.moveTo(0,-laneW*0.26);
    ctx.lineTo(laneW*0.18,laneW*0.22);
    ctx.lineTo(-laneW*0.18,laneW*0.22);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = PAL.brown; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = PAL.white;
    ctx.fillRect(-laneW*0.13, laneW*0.02, laneW*0.26, laneW*0.06);
  } else if (type === 'pothole'){
    ctx.fillStyle = PAL.brown;
    ctx.beginPath(); ctx.ellipse(0,0,laneW*0.24,laneW*0.15,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(0,0,laneW*0.16,laneW*0.09,0,0,Math.PI*2); ctx.fill();
  } else {
    var w = laneW*0.56, h = w*1.3;
    ctx.fillStyle = 'rgba(74,47,35,0.18)';
    roundRectPath(ctx,-w/2+2,-h/2+3,w,h,10); ctx.fill();
    roundRectPath(ctx,-w/2,-h/2,w,h,10);
    ctx.fillStyle = PAL.terracotta; ctx.fill();
    ctx.strokeStyle = PAL.brown; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = PAL.glass;
    roundRectPath(ctx,-w*0.3,-h*0.28,w*0.6,h*0.32,4); ctx.fill();
    ctx.fillStyle = PAL.brown;
    var corners = [[-w*0.42,-h*0.36],[w*0.42,-h*0.36],[-w*0.42,h*0.36],[w*0.42,h*0.36]];
    for (var i=0;i<corners.length;i++){
      ctx.beginPath(); ctx.arc(corners[i][0],corners[i][1],w*0.1,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

function drawRoadsideDecor(ctx, x, y, type){
  ctx.save();
  ctx.translate(x, y);
  if (type === 'palm'){
    ctx.strokeStyle = PAL.brown; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0,20); ctx.quadraticCurveTo(4,0,0,-18); ctx.stroke();
    ctx.fillStyle = PAL.green;
    for (var i=0;i<5;i++){
      var a = (i/5) * Math.PI * 2;
      ctx.beginPath();
      ctx.ellipse(Math.cos(a)*10, -18+Math.sin(a)*6, 12, 5, a, 0, Math.PI*2);
      ctx.fill();
    }
  } else {
    ctx.fillStyle = PAL.greenDark;
    roundRectPath(ctx,-5,-22,10,30,5); ctx.fill();
    roundRectPath(ctx,-14,-10,10,10,4); ctx.fill();
    roundRectPath(ctx,4,-16,10,10,4); ctx.fill();
  }
  ctx.restore();
}

function drawMenuIcons(){
  var c1 = document.getElementById('iconSnake');
  var g1 = c1.getContext('2d');
  g1.clearRect(0,0,c1.width,c1.height);
  g1.fillStyle = PAL.creamDark;
  roundRectPath(g1,0,0,c1.width,c1.height,16); g1.fill();

/* ==========================================================================
   JEU 1 — COMBI SNAKE
   ========================================================================== */
var sGrid = { cols:0, rows:0, cell:0, ox:0, oy:0 };
var snake, sFood, sScore, sTick, sAcc, sFirstInput, sBestCache;

function setupSnakeGrid(){
  var targetCols = 9;
  var cell = Math.max(18, Math.floor(W / targetCols));
  var cols = Math.max(5, Math.floor(W / cell));
  var rows = Math.max(7, Math.floor(H / cell));
  sGrid.cell = cell; sGrid.cols = cols; sGrid.rows = rows;
  sGrid.ox = Math.floor((W - cols*cell) / 2);
  sGrid.oy = Math.floor((H - rows*cell) / 2);
}

function resetSnake(){
  setupSnakeGrid();
  var cx = Math.floor(sGrid.cols/2), cy = Math.floor(sGrid.rows/2);
  snake = {
    body:[ {x:cx,y:cy}, {x:cx-1,y:cy}, {x:cx-2,y:cy} ],
    dir:{x:1,y:0}, nextDir:{x:1,y:0}
  };
  sScore = 0; sTick = 170; sAcc = 0; sFirstInput = false;
  sBestCache = getBest('snake');
  placeSnakeFood();
  updateHUD(sScore, sBestCache);
}

function placeSnakeFood(){
  var pos;
  do {
    pos = { x:randInt(0,sGrid.cols-1), y:randInt(0,sGrid.rows-1) };
  } while (snake.body.some(function(s){ return s.x===pos.x && s.y===pos.y; }));
  sFood = { x:pos.x, y:pos.y, type: Math.random() < 0.5 ? 'can' : 'board' };
}

function isOpposite(a,b){ return a.x === -b.x && a.y === -b.y; }

function trySetSnakeDir(nx, ny){
  if (!isOpposite({x:nx,y:ny}, snake.dir)){
    snake.nextDir = {x:nx,y:ny};
    if (!sFirstInput){ sFirstInput = true; hideHint(); }
  }
}

function updateSnake(dtMs){
  sAcc += dtMs;
  if (sAcc < sTick) return;
  sAcc = 0;
  if (!isOpposite(snake.nextDir, snake.dir)) snake.dir = snake.nextDir;
  var head = snake.body[0];
  var nx = head.x + snake.dir.x, ny = head.y + snake.dir.y;
  if (nx < 0 || nx >= sGrid.cols || ny < 0 || ny >= sGrid.rows){ endSnake(); return; }
  if (snake.body.some(function(s){ return s.x===nx && s.y===ny; })){ endSnake(); return; }
  snake.body.unshift({x:nx,y:ny});
  if (nx === sFood.x && ny === sFood.y){
    sScore += 10;
    sTick = Math.max(95, 170 - Math.floor(sScore/40)*6);
    placeSnakeFood();
    updateHUD(sScore, sBestCache);
  } else {
    snake.body.pop();
  }
}

function renderSnake(){
  ctx.fillStyle = PAL.cream;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle = PAL.paper;
  roundRectPath(ctx, sGrid.ox-4, sGrid.oy-4, sGrid.cols*sGrid.cell+8, sGrid.rows*sGrid.cell+8, 14);
  ctx.fill();

  ctx.fillStyle = PAL.creamDark;
  for (var x=0;x<=sGrid.cols;x++){
    for (var y=0;y<=sGrid.rows;y++){
      ctx.beginPath();
      ctx.arc(sGrid.ox+x*sGrid.cell, sGrid.oy+y*sGrid.cell, 1.6, 0, Math.PI*2);
      ctx.fill();
    }
  }

  var fcx = sGrid.ox + sFood.x*sGrid.cell + sGrid.cell/2;
  var fcy = sGrid.oy + sFood.y*sGrid.cell + sGrid.cell/2;
  drawFood(ctx, fcx, fcy, sGrid.cell*0.86, sFood.type);

  for (var i=snake.body.length-1;i>=1;i--){
    var seg = snake.body[i], prev = snake.body[i-1];
    var angle = Math.atan2(prev.y-seg.y, prev.x-seg.x);
    drawTrailer(ctx, sGrid.ox+seg.x*sGrid.cell+sGrid.cell/2, sGrid.oy+seg.y*sGrid.cell+sGrid.cell/2, sGrid.cell*0.94, angle, i);
  }

  var head = snake.body[0];
  var headAngle = Math.atan2(snake.dir.y, snake.dir.x);
  drawCombi(ctx, sGrid.ox+head.x*sGrid.cell+sGrid.cell/2, sGrid.oy+head.y*sGrid.cell+sGrid.cell/2, sGrid.cell*1.05, headAngle);
}

function endSnake(){
  running = false;
  flashCrash();
  var token = sessionToken;
  setTimeout(function(){
    if (token !== sessionToken) return;
    finishRun('snake', sScore, 'COMBI ACCIDENTÉ !');
  }, 380);
}

/* ==========================================================================
   JEU 2 — BEETLE HIGHWAY
   ========================================================================== */
var hLanes = { count:3, width:0, roadW:0, roadX:0 };
var beetle, hObstacles, hDecor, hScore, hDistance, hSpeed, hSpawnAcc, hFirstInput, hBestCache;
var H_BASE_SPEED = 230, H_MAX_SPEED = 560, H_ACCEL = 0.055, H_SPAWN_GAP = 230, BEETLE_Y_RATIO = 0.74;

function setupHighwayLanes(){
  var roadW = Math.min(W*0.86, 380);
  hLanes.roadW = roadW;
  hLanes.roadX = (W - roadW) / 2;
  hLanes.width = roadW / hLanes.count;
}

function laneCenterX(lane){
  return hLanes.roadX + hLanes.width*lane + hLanes.width/2;
}

function resetHighway(){
  setupHighwayLanes();
  beetle = { x: laneCenterX(1), targetLane:1, tilt:0 };
  hObstacles = [];
  hDecor = [];
  hScore = 0; hDistance = 0; hSpeed = H_BASE_SPEED; hSpawnAcc = 0; hFirstInput = false;
  hBestCache = getBest('highway');
  updateHUD(hScore, hBestCache);
}

function setBeetleLane(lane){
  beetle.targetLane = clamp(lane, 0, hLanes.count-1);
  if (!hFirstInput){ hFirstInput = true; hideHint(); }
}

function spawnObstacleWave(){
  var lanesToBlock = Math.random() < 0.35 ? 2 : 1;
  var lanes = [];
  for (var i=0;i<hLanes.count;i++) lanes.push(i);
  for (var j=lanes.length-1;j>0;j--){
    var k = randInt(0,j);
    var tmp = lanes[j]; lanes[j] = lanes[k]; lanes[k] = tmp;
  }
  var chosen = lanes.slice(0, lanesToBlock);
  var types = ['cone','pothole','slowcar'];
  chosen.forEach(function(lane){
    hObstacles.push({ lane:lane, y:-80, type: choice(types) });
  });
}

function spawnDecor(){
  var side = Math.random() < 0.5 ? -1 : 1;
  var x = side < 0 ? rand(6, hLanes.roadX-14) : rand(hLanes.roadX+hLanes.roadW+14, W-6);
  hDecor.push({ x:x, y:-40, type: Math.random() < 0.5 ? 'palm' : 'cactus' });
}

function updateHighway(dt){
  hSpeed = Math.min(H_MAX_SPEED, H_BASE_SPEED + hDistance*H_ACCEL);
  var dy = hSpeed * dt;
  hDistance += dy;
  hScore = Math.floor(hDistance/10);

  var tx = laneCenterX(beetle.targetLane);
  beetle.x = lerp(beetle.x, tx, Math.min(1, dt*10));
  beetle.tilt = clamp((tx-beetle.x)*0.012, -0.35, 0.35);

  for (var i=hObstacles.length-1;i>=0;i--){
    hObstacles[i].y += dy;
    if (hObstacles[i].y > H+80) hObstacles.splice(i,1);
  }
  for (var d=hDecor.length-1;d>=0;d--){
    hDecor[d].y += dy;
    if (hDecor[d].y > H+60) hDecor.splice(d,1);
  }

  hSpawnAcc += dy;
  if (hSpawnAcc >= H_SPAWN_GAP){
    hSpawnAcc = 0;
    spawnObstacleWave();
    if (Math.random() < 0.6) spawnDecor();
  }

  updateHUD(hScore, hBestCache);

  var shrink = 0.7;
  var bw = hLanes.width*0.56*shrink, bh = bw*1.3;
  var beetleY = H*BEETLE_Y_RATIO;
  var bx1 = beetle.x-bw/2, bx2 = beetle.x+bw/2, by1 = beetleY-bh/2, by2 = beetleY+bh/2;
  for (var o=0;o<hObstacles.length;o++){
    var obs = hObstacles[o];
    var ox = laneCenterX(obs.lane);
    var ow = hLanes.width*0.5*shrink;
    var oh = ow * (obs.type === 'slowcar' ? 1.3 : 0.8);
    var ox1 = ox-ow/2, ox2 = ox+ow/2, oy1 = obs.y-oh/2, oy2 = obs.y+oh/2;
    if (rectsOverlap(bx1,by1,bx2,by2,ox1,oy1,ox2,oy2)){ endHighway(); return; }
  }
}

function renderHighway(){
  ctx.fillStyle = PAL.sand;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle = PAL.road;
  ctx.fillRect(hLanes.roadX,0,hLanes.roadW,H);
  ctx.fillStyle = PAL.roadLine;
  ctx.fillRect(hLanes.roadX-4,0,4,H);
  ctx.fillRect(hLanes.roadX+hLanes.roadW,0,4,H);

  var dashLen=28, gap=22, period=dashLen+gap;
  var offset = hDistance % period;
  for (var lane=1; lane<hLanes.count; lane++){
    var lx = hLanes.roadX + hLanes.width*lane - 2;
    for (var y=-period; y<H+period; y+=period){
      ctx.fillRect(lx, y+offset, 4, dashLen);
    }
  }

  hDecor.forEach(function(dd){ drawRoadsideDecor(ctx, dd.x, dd.y, dd.type); });
  hObstacles.forEach(function(oo){
    var ox = laneCenterX(oo.lane);
    drawObstacle(ctx, ox, oo.y, hLanes.width, oo.type);
  });

  drawBeetleTopDown(ctx, beetle.x, H*BEETLE_Y_RATIO, hLanes.width*0.62, beetle.tilt);
}

function endHighway(){
  running = false;
  flashCrash();
  var token = sessionToken;
  setTimeout(function(){
    if (token !== sessionToken) return;
    finishRun('highway', hScore, 'CRASH SUR LA ROUTE !');
  }, 380);
}

   FIN DE PARTIE / EFFETS PARTAGÉS
   ========================================================================== */
function flashCrash(){
  canvasWrap.classList.add('crash');
  setTimeout(function(){ canvasWrap.classList.remove('crash'); }, 450);
}

function finishRun(mode, score, title){
  var isRecord = setBestIfHigher(mode, score);
  goTitle.textContent = title;
  goScore.textContent = score;
  goBest.textContent = getBest(mode);
  newRecordBadge.classList.toggle('hidden', !isRecord);
  gameOverPanel.classList.remove('hidden');
}

/* ==========================================================================
   ENTRÉES (tactile + clavier)
   ========================================================================== */
var touchStartX = 0, touchStartY = 0;
var SWIPE_THRESHOLD = 24;

canvasWrap.addEventListener('pointerdown', function(e){
  touchStartX = e.clientX; touchStartY = e.clientY;
  try{ canvasWrap.setPointerCapture(e.pointerId); }catch(err){}
  if (e.cancelable) e.preventDefault();
  if (currentMode === 'highway' && running){
    var rect = canvasWrap.getBoundingClientRect();
    var relX = e.clientX - rect.left;
    setBeetleLane(beetle.targetLane + (relX < rect.width/2 ? -1 : 1));
  }
});

canvasWrap.addEventListener('pointerup', function(e){
  if (currentMode !== 'snake' || !running) return;
  var dx = e.clientX - touchStartX, dy = e.clientY - touchStartY;
  if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return;
  if (Math.abs(dx) > Math.abs(dy)) trySetSnakeDir(dx>0?1:-1, 0);
  else trySetSnakeDir(0, dy>0?1:-1);
});

window.addEventListener('keydown', function(e){
  if (!running) return;
  if (currentMode === 'snake'){
    if (e.key === 'ArrowUp') trySetSnakeDir(0,-1);
    else if (e.key === 'ArrowDown') trySetSnakeDir(0,1);
    else if (e.key === 'ArrowLeft') trySetSnakeDir(-1,0);
    else if (e.key === 'ArrowRight') trySetSnakeDir(1,0);
  } else if (currentMode === 'highway'){
    if (e.key === 'ArrowLeft') setBeetleLane(beetle.targetLane-1);
    else if (e.key === 'ArrowRight') setBeetleLane(beetle.targetLane+1);
  }
});

function showHint(text){ swipeHint.textContent = text; swipeHint.classList.add('show'); }
function hideHint(){ swipeHint.classList.remove('show'); }

/* ==========================================================================
   COMPTE À REBOURS / NAVIGATION
   ========================================================================== */
function startCountdown(onDone){
  var token = sessionToken;
  var seq = ['3','2','1','GO !'];
  var i = 0;
  countdownEl.classList.add('show');
  function step(){
    if (token !== sessionToken) return;
    countdownEl.textContent = seq[i];
    i++;
    if (i < seq.length){
      setTimeout(step, 550);
    } else {
      setTimeout(function(){
        if (token !== sessionToken) return;
        countdownEl.classList.remove('show');
        onDone();
      }, 550);
    }
  }
  step();
}

function updateHUD(score, best){
  hudScoreEl.textContent = score;
  hudBestEl.textContent = best;
}

function showScreen(id){
  var screens = document.querySelectorAll('.screen');
  for (var i=0;i<screens.length;i++){ screens[i].classList.remove('is-active'); }
  document.getElementById(id).classList.add('is-active');
}

function goToMenu(){
  sessionToken++;
  running = false; currentMode = null;
  gameOverPanel.classList.add('hidden');
  bestSnakeEl.textContent = getBest('snake');
  bestHighwayEl.textContent = getBest('highway');
  showScreen('screen-menu');
}

function playMode(mode){
  sessionToken++;
  currentMode = mode;
  gameOverPanel.classList.add('hidden');
  showScreen('screen-game');
  resizeCanvas();
  if (mode === 'snake'){
    resetSnake();
    renderSnake();
    showHint('Glisse le doigt pour diriger le Combi');
  } else {
    resetHighway();
    renderHighway();
    showHint('Touche à gauche ou à droite pour changer de voie');
  }
  running = false;
  startCountdown(function(){ running = true; });
}

function retry(){ playMode(currentMode); }

/* --------------------------------- BOUTONS --------------------------------- */
var modeCards = document.querySelectorAll('.mode-card');
for (var m=0;m<modeCards.length;m++){
  modeCards[m].addEventListener('click', function(){ playMode(this.getAttribute('data-mode')); });
}
btnBack.addEventListener('click', function(){
  if (currentMode === 'snake') setBestIfHigher('snake', sScore);
  if (currentMode === 'highway') setBestIfHigher('highway', hScore);
  goToMenu();
});
btnRetry.addEventListener('click', function(){ gameOverPanel.classList.add('hidden'); retry(); });
btnMenu.addEventListener('click', goToMenu);

/* ------------------------------- BOUCLE PRINCIPALE ------------------------------- */
var lastTs = 0;
function loop(ts){
  var dt = Math.min(0.05, lastTs ? (ts-lastTs)/1000 : 0);
  lastTs = ts;
  if (running){
    if (currentMode === 'snake'){ updateSnake(dt*1000); renderSnake(); }
    else if (currentMode === 'highway'){ updateHighway(dt); renderHighway(); }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ---------------------------------- INIT ---------------------------------- */
bestSnakeEl.textContent = getBest('snake');
bestHighwayEl.textContent = getBest('highway');
drawMenuIcons();

})();
</script>
